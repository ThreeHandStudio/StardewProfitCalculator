<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Stardew Valley Crop Profit Calculator</title>
        <!-- <link rel="stylesheet" href="style.css"> -->
        <script src="cropinfo.js"></script>

        <style>
            @font-face {
                font-family: 'Stardew Bold';
                src: url('fonts/svbold.ttf');
            }

            h1, th, td, label, select{
                font-family: 'Stardew Bold', sans-serif;
            }
        </style>
    </head>

    <body onload="initializer()">
        <h1>Stardew Valley Crop Profit Calculator</h1>

        <table>
            <tr>
                <td>    
                    <label for="seasonSelect">Season:</label>
                    <select id="seasonSelect">
                    </select>
                </td>

                <td style="width:48px;"></td>

                <td>
                    <label for="cropSelect">Crop:</label>
                    <select id="cropSelect">
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="regrows">Regrows:</label>
                    <input type="checkbox" id="regrows" disabled>
                </td>

                <td id="regrowthtime"></td>
            </tr>
        </table>

        <br>

        <table id="seedInfoTable">
            <tr>
                <th>Seed Cost</th>
                <td id="pierreIcon" style="width:48px;height:48px"><img src="images/Pierre_Icon.png" alt="Pierre"></td>
                <td id="jojaIcon" style="width:48px;height:48px"><img src="images/Morris_Icon.png" alt="Joja"></td>
                <td id="sandyIcon" style="width:48px;height:48px"><img src="images/Sandy_Icon.png" alt="Sandy"></td>
            </tr>
            <tr>
                <td id="seedImage"></td>
                <td id="pierreCost"></td>
                <td id="jojaCost"></td>
                <td id="sandyCost"></td>
            </tr>
        </table>    

        <table id="sellPriceTable">
            <tr>
                <th>Sell Prices</th>
            </tr>
            <tr>
                <th>Quality</th>
                <th id="normal"></th>
                <th id="silver" style="width:48px;height:48px"><img src="images/Quality_Icon_Silver.png" alt="Silver"></th>
                <th id="gold" style="width:48px;height:48px"><img src="images/Quality_Icon_Gold.png" alt="Gold"></th>
                <th id="iridium" style="width:48px;height:48px"><img src="images/Quality_Icon_Iridium.png" alt="Iridium"></th>
            </tr>
            <tr>
                <td style="height:48px"><img src="images/Gold_Coin.png" style="width:24px;height:24px" alt="Normal"></td>
                <td id = "normalPrice"></td>
                <td id="silverPrice"></td>
                <td id="goldPrice"></td>
                <td id="iridiumPrice"></td>
            </tr>
            <tr>
                <td id="tiller" style="height:48px"><img src="images/Talent_Tiller.png" alt="Tiller"></td>
                <td id="tillerNormal"></td>
                <td id="tillerSilver"></td>
                <td id="tillerGold"></td>
                <td id="tillerIridium"></td>
            </tr>
        </table>

        <br>

        <table id="artisanPriceTable">
            <tr>
                <th>Artisan Goods</th>
            </tr>
            <tr>
                <table id="kegPriceTable">
                    <tr>
                        <th></th>
                        <th id="kegNormal"><img src="images/Icon_Wine.png" alt="keg" style="width:48px;"></th>
                        <th id="jarNormal"><img src="images/Icon_Jelly.png" alt="Jar" style="width:48px;"></th>
                        <th id="beeNormal"><img src="images/Icon_Honey.png" alt="Bee House" style="width:48px;"></th>
                    </tr>
                    <tr>
                        <td style="width:48px;"><img src="images/Gold_Coin.png" style="width:24px;height:24px" alt="Normal"></td>
                        <td id="kegNormalPrice"></td>
                        <td id="jarNormalPrice"></td>
                        <td id="beeNormalPrice"></td>
                    </tr>
                    <tr>
                        <td style="width:48px;"><img src="images/Talent_Artisan.png" alt="Artisan"></td>
                        <td id="kegArtisanPrice"></td>
                        <td id="jarArtisanPrice"></td>
                        <td id="beeArtisanPrice"></td>
                    </tr>
                </table>
            </tr>
        </table>

        <br>

        <label for="farmingLevelNumber">Farming Level:</label>
        <input type="number" id="farmingLevelNumber" min="0" max="14" value="0">

        <br>

        <table id="profitPerDayTable">
            <tr>
                <th>Profit Per Day</th>
            </tr>
            <tr>
                <td></td>
                <td id="noFertilizer">No Fertilizer</td>
                <td id="basicFertilizer" style="width:64px;"><img src="images/Fertilizer_Basic.png" alt="Basic Fertilizer" style="width:48px"></td>
                <td id="qualityFertilizer" style="width:64px;"><img src="images/Fertilizer_Quality.png" alt="Quality Fertilizer" style="width:48px"></td>
                <td id="deluxeFertilizer" style="width:64px;"><img src="images/Fertilizer_Deluxe.png" alt="Deluxe Fertilizer" style="width:48px"></td>
                <td id="speedBasic" style="width:64px;"><img src="images/Speed-Gro.png" alt="Speed-Gro" style="width:48px"></td>
                <td id="speedDeluxe" style="width:64px;"><img src="images/Speed-Gro_Deluxe.png" alt="Deluxe Speed-Gro" style="width:48px"></td>
                <td id="speedHyper" style="width:64px;"><img src="images/Speed-Gro_Hyper.png" alt="Hyper Speed-Gro" style="width:48px"></td>
            </tr>
            <tr>
                <td id="farmLevelText" style="width: 84px;">Farm Level</td>
            </tr>
            <tr>
                <td><img src="images/Gold_Coin.png" style="width:24px;height:24px" alt="Normal"></td>
                <td id="noFertilizerProfit"></td>
                <td id="basicFertilizerProfit"></td>
                <td id="qualityFertilizerProfit"></td>
                <td id="deluxeFertilizerProfit"></td>
                <td id="speedProfit"></td>
                <td id="speedDeluxeProfit"></td>
                <td id="speedHyperProfit"></td>
            </tr>
            <tr>
                <td><img src="images/Talent_Tiller.png" style="width:24px;height:24px" alt="Tiller"></td>
                <td id="noFertilizerTillerProfit"></td>
                <td id="basicFertilizerTillerProfit"></td>
                <td id="qualityFertilizerTillerProfit"></td>
                <td id="deluxeFertilizerTillerProfit"></td>
                <td id="speedTillerProfit"></td>
                <td id="speedDeluxeTillerProfit"></td>
                <td id="speedHyperTillerProfit"></td>
            </tr>
            <tr>
                <td><img src="images/Talent_Agriculturist.png" style="width:24px;height:24px" alt="Agriculturist"></td>
                <td id="noFertilizerAgriculturistProfit"></td>
                <td id="basicFertilizerAgriculturistProfit"></td>
                <td id="qualityFertilizerAgriculturistProfit"></td>
                <td id="deluxeFertilizerAgriculturistProfit"></td>
                <td id="speedAgriculturistProfit"></td>
                <td id="speedDeluxeAgriculturistProfit"></td>
                <td id="speedHyperAgriculturistProfit"></td>
            </tr>
        </table>
    </body>
</html>
